<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Whelnett Wedfest Queue</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat&display=swap" rel="stylesheet">
  <style>
    body {
      background-color: #fcdb92;
      font-family: 'Montserrat', sans-serif;
      color: #ff69b4;
      padding: 40px 80px;
      text-align: center;
    }

    h1 {
      font-family: Impact, sans-serif;
      color: #ff69b4;
      font-size: 5em;
      text-transform: uppercase;
      margin-bottom: 30px;
    }

    p {
      font-size: 2em;
      margin-bottom: 20px;
    }

    #countdown {
      font-size: 2em;
      font-weight: bold;
      margin: 30px 0;
      color: #ff69b4;
    }

    .loading-container {
      margin-top: 20px;
      width: 80%;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
      background-color: #ddd;
      border-radius: 25px;
      overflow: hidden;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

.loading-bar {
  height: 40px;
  width: 0%;
  background-image: repeating-linear-gradient(
    90deg,
    #ff69b4,
    #ff69b4 10px,
    #ffffff 10px,
    #ffffff 20px
  );
  text-align: center;
  line-height: 40px;
  color: #ff69b4; /* Updated to match main text */
  font-weight: bold;
  font-size: 1.5em;
  transition: width 0.1s linear;
}

  </style>
</head>
<body>
  <h1>You are now in the queue!</h1>
  <p>You are in the queue for the <strong>Whelnett Wedfest 2026</strong> ticket booking. When it is your turn, you will have until <strong>Monday 15th June 2026</strong> to enter the website and book your ticket.</p>

  <div id="countdown">Ticket booking opens in 30 seconds</div>

  <div class="loading-container">
    <div class="loading-bar" id="loadingBar">0%</div>
  </div>

  <script>
    const bar = document.getElementById('loadingBar');
    const countdown = document.getElementById('countdown');
    let progress = 0;
    let timeLeft = 30;
    const duration = 30000; // 30 seconds
    const interval = 100; // update every 100ms
    const step = 100 / (duration / interval);

    const timer = setInterval(() => {
      progress += step;
      if (progress >= 100) {
        progress = 100;
        clearInterval(timer);
        window.location.href = "https://hannahwh05.github.io/whelnettwedfest/book-tickets.html";
      }
      bar.style.width = progress + "%";
      bar.textContent = Math.floor(progress) + "%";

      // Update countdown every second
      if (progress % (step * 10) < step) {
        timeLeft--;
        countdown.textContent = `Ticket booking opens in ${timeLeft} seconds`;
      }
    }, interval);
  </script>
</body>
</html>
