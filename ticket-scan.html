<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Ticket Scan | Whelnett Wedfest 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/site.css">
  <script src="assets/site.js" defer></script>
</head>	
<body>
		<!-- 1. The Audio File (A clean 'success' beep) -->
	<audio id="scanSound" src="https://hannahwh05.github.io/whelnettwedfest/beep.mp3" preload="auto"></audio>

	<!-- 2. The Interactive Overlay -->
	<div id="scan-overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#fff; z-index:9999; display:flex; flex-direction:column; justify-content:center; align-items:center;">
			<h2 style="font-family:sans-serif; margin-bottom:20px;">🎫 Ticket Scanned!</h2>
			<button onclick="playBeep()" style="padding:15px 30px; font-size:18px; background:#28a745; color:white; border:none; border-radius:5px; cursor:pointer; font-weight:bold;">
					Tap to see ticket holder information
			</button>
	</div>

	<!-- 3. The Script to Play Sound and Reveal Site -->
	<script>
	function playBeep() {
			var audio = document.getElementById("scanSound");
			audio.play().then(() => {
					// Hide the overlay after the sound plays
					document.getElementById("scan-overlay").style.display = "none";
			}).catch(function(error) {
					console.log("Audio play failed:", error);
					document.getElementById("scan-overlay").style.display = "none";
			});
	}
	</script>	
	
	<iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vRQW_HRQdY7rUz67hOA1eavyqSbBvE2uff4h-WdU90qgTnRPJ9sZ80FnzkW8j0opTDwsghLZpsi8nDn/pubhtml?gid=0&amp;single=true&amp;widget=true&amp;headers=false" width="100%" height="100%" style="border: none;"></iframe>
</body>
</html>
