<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Ticket Scan | Whelnett Wedfest 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/site.css">
  <script src="assets/site.js" defer></script>
</head> 
<body>
  <!-- 1. The Audio File (A clean 'success' beep) -->
  <audio id="scanSound" src="https://hannahwh05.github.io/whelnettwedfest/beep.mp3" preload="auto"></audio>

  <!-- 2. The Interactive Overlay -->
  <div id="scan-overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#fff; z-index:9999; display:flex; flex-direction:column; justify-content:center; align-items:center;">
      <h2 style="font-family:'Montserrat', sans-serif; margin-bottom:20px;">🎫 Ticket Scanned!</h2>
      <button onclick="handleScanAction()" style="padding:15px 30px; font-size:18px; background:#28a745; color:white; border:none; border-radius:5px; cursor:pointer; font-weight:bold; font-family:'Montserrat', sans-serif;">
          Tap to see ticket holder information
      </button>
  </div>

  <!-- 3. The Script to Play Sound and Redirect -->
  <script>
  function handleScanAction() {
      var audio = document.getElementById("scanSound");
      
      // Target range URL for this specific ticket scan page
      var targetSheetUrl = "https://docs.google.com/spreadsheets/d/1D_DVN7O5OGMEBpQ-ZSjLTLibR1AsGhkcM1JYTzARBKw/edit?gid=0#gid=0&range=A51:H51";

      audio.play().then(() => {
          // Short delay (300ms) allows the audio to snap-fire before the window switches away
          setTimeout(function() {
              window.location.href = targetSheetUrl;
          }, 300);
      }).catch(function(error) {
          console.log("Audio play failed:", error);
          // Fallback: Redirect immediately if mobile sound execution policies block audio context
          window.location.href = targetSheetUrl;
      });
  }
  </script> 
</body>
</html>
